name: EXAONE-4.0-1.2B
id: exaone4_1_2b
status: public
headline: State-of-the-art hybrid reasoning language model with advanced multilingual capabilities and tool use.
domain: Generative AI
description: EXAONE 4.0 is a cutting-edge large language model that integrates both non-reasoning and reasoning modes to deliver excellent usability and advanced reasoning abilities. The model is quantized to w4 (4-bit weights) and part of the model is quantized to w8 (8-bit weights) making it suitable for on-device deployment. Features include agentic tool use, multilingual support (English, Korean, Spanish), and hybrid attention with QK-Reorder-Norm architecture. For Prompt and output length specified below, the time to first token is EXAONE-PromptProcessor-Quantized's latency and average time per addition token is EXAONE-TokenGenerator-Quantized's latency.
use_case: Text Generation
